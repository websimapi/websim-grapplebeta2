<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grapple</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.160.0",
                "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="score-display">DISTANCE: 0m</div>
        <div id="grapple-display">GRAPPLES: 0</div>
        <div id="instruction">HOLD CLICK TO GRAPPLE</div>
    </div>

    <div id="start-screen">
        <h1>GRAPPLE</h1>
        <p class="subtitle">CYBERPUNK DRIFT</p>
        <button id="start-btn">PLAY</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>WIPEOUT</h1>
        <p id="final-score">Distance: 0m</p>
        <div id="replay-container">
            <video id="replay-video" controls playsinline loop></video>
        </div>
        <button id="restart-btn">RETRY</button>
    </div>

    <script type="module" src="./main.js"></script>

</body>
</html>
